name: docs

on:
  push:
    branches:
      - main
      - "copilot/**"
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get install -y doxygen graphviz

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Jekyll dependencies
        run: |
          cd docs
          bundle install

      - name: Generate Doxygen API docs
        run: doxygen Doxyfile

      - name: Build Jekyll site
        run: |
          cd docs
          bundle exec jekyll build \
            --destination ../_site

      - name: Copy Doxygen output into site
        run: cp -r doxygen_out/html _site/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload site preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: _site
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/copilot/')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
