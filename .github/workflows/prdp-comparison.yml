name: prdp-comparison
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  prdp-comparison-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat .github/workflows/apt-deps.txt)
        # Mesa lavapipe provides a software Vulkan ICD for headless CI
        sudo apt-get install -y libvulkan-dev vulkan-tools mesa-vulkan-drivers
        # ImageMagick for PPM to PNG conversion
        sudo apt-get install -y imagemagick
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.14
      with:
        key: ${{ runner.os }}-prdp-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-prdp-ccache-${{ github.ref }}
          ${{ runner.os }}-prdp-ccache-
    - name: Install latest SDL
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://www.libsdl.org/release/SDL2-2.24.1.tar.gz
        tar -xzf SDL2-2.24.1.tar.gz
        cd SDL2-2.24.1
        ./configure
        make -j $(nproc)
        sudo make install
    - name: Install latest tinyxml2
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
        tar -xzf 10.0.0.tar.gz
        cd tinyxml2-10.0.0
        mkdir build
        cd build
        cmake ..
        make
        sudo make install
    - name: Install Python dependencies
      run: python3 -m pip install -r requirements.txt
    - name: Configure with ParallelRDP tests
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        cmake --no-warn-unused-cli -H. -Bbuild-prdp -GNinja \
          -DCMAKE_BUILD_TYPE:STRING=Debug \
          -DLUS_BUILD_TESTS=ON \
          -DLUS_BUILD_PRDP_TESTS=ON
      env:
        CC: gcc-12
        CXX: g++-12
    - name: Build
      run: cmake --build build-prdp --config Debug --parallel $(nproc)
    - name: Run comparison tests
      run: |
        # Run only the ParallelRDP comparison tests
        # These are informational — failures don't block CI
        ctest --test-dir build-prdp \
          --output-on-failure \
          --tests-regex "ParallelRDPComparison" \
          || echo "::warning::Some ParallelRDP comparison tests reported differences (this is expected)"
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        # Use Mesa lavapipe software Vulkan ICD (lvp_icd.json on Ubuntu 24.04+)
        VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
    - name: Run standard tests
      run: |
        # Also run the standard test suite to make sure nothing is broken
        ctest --test-dir build-prdp \
          --output-on-failure \
          --exclude-regex "ParallelRDPComparison"
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
    - name: Convert PPM images to PNG
      run: |
        cd docs/images
        for ppm in *.ppm; do
          [ -f "$ppm" ] || continue
          png="${ppm%.ppm}.png"
          convert "$ppm" "$png"
          rm "$ppm"
        done
    - name: Upload reference images
      uses: actions/upload-artifact@v4
      with:
        name: reference-images
        path: docs/images/*.png
    - name: Commit updated images
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/images/
        git diff --cached --quiet || {
          git commit -m "Update test reference images [skip ci]"
          git push
        }
