name: test-validation
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat .github/workflows/apt-deps.txt)
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.14
      with:
        key: ${{ runner.os }}-test-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-test-ccache-${{ github.ref }}
          ${{ runner.os }}-test-ccache-
    - name: Install latest SDL
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://www.libsdl.org/release/SDL2-2.24.1.tar.gz
        tar -xzf SDL2-2.24.1.tar.gz
        cd SDL2-2.24.1
        ./configure
        make -j $(nproc)
        sudo make install
    - name: Install latest tinyxml2
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
        tar -xzf 10.0.0.tar.gz
        cd tinyxml2-10.0.0
        mkdir build
        cd build
        cmake ..
        make
        sudo make install
    - name: Install Python dependencies
      run: python3 -m pip install -r requirements.txt
    - name: Configure
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        cmake --no-warn-unused-cli -H. -Bbuild-test -GNinja \
          -DCMAKE_BUILD_TYPE:STRING=Debug \
          -DLUS_BUILD_TESTS=ON
      env:
        CC: gcc-12
        CXX: g++-12
    - name: Build
      run: cmake --build build-test --config Debug --parallel $(nproc)
    - name: Run tests
      run: ctest --test-dir build-test --output-on-failure
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy

  test-linux-vulkan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat .github/workflows/apt-deps.txt) \
          libvulkan-dev vulkan-tools mesa-vulkan-drivers \
          libglvnd-dev
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.14
      with:
        key: ${{ runner.os }}-vulkan-test-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-vulkan-test-ccache-${{ github.ref }}
          ${{ runner.os }}-vulkan-test-ccache-
    - name: Install latest SDL (with Vulkan support)
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://www.libsdl.org/release/SDL2-2.24.1.tar.gz
        tar -xzf SDL2-2.24.1.tar.gz
        cd SDL2-2.24.1
        ./configure --enable-video-vulkan
        make -j $(nproc)
        sudo make install
    - name: Install latest tinyxml2
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
        tar -xzf 10.0.0.tar.gz
        cd tinyxml2-10.0.0
        mkdir build
        cd build
        cmake ..
        make
        sudo make install
    - name: Install Python dependencies
      run: python3 -m pip install -r requirements.txt
    - name: Configure (Vulkan backend)
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        cmake --no-warn-unused-cli -H. -Bbuild-vulkan -GNinja \
          -DCMAKE_BUILD_TYPE:STRING=Debug \
          -DLUS_BUILD_TESTS=ON \
          -DENABLE_VULKAN=ON
      env:
        CC: gcc-12
        CXX: g++-12
    - name: Build (Vulkan backend)
      run: cmake --build build-vulkan --config Debug --parallel $(nproc)
    - name: Run tests (lavapipe software Vulkan)
      run: ctest --test-dir build-vulkan --output-on-failure
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        LIBGL_ALWAYS_SOFTWARE: "1"
